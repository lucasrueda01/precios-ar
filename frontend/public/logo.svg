<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="100%" height="100%">
  <defs>
    <style>
      .logo-text {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
        font-size: 72px;
        letter-spacing: -1.5px;
      }
      .precio {
        font-weight: 500;
        fill: #334155; /* Gris oscuro para dar seriedad */
      }
      .ar {
        font-weight: 800;
        fill: #0ea5e9; /* Celeste vibrante estilo "Argentina/Tech" */
      }
    </style>
  </defs>
  
  <text x="50%" y="55%" text-anchor="middle" dominant-baseline="middle" class="logo-text">
    <tspan class="precio">precio</tspan><tspan class="ar">AR</tspan>
  </text>
</svg>
